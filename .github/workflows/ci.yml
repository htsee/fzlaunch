name: ci

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go 1.25.5
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
      - name: Install dependencies
        run: go get .
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
      - name: Build
        run: go build -v ./...
